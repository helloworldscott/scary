<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLOOR 13</title>
  <!-- How to run: open this file directly in a browser (double-click) or host on GitHub Pages. -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <h1>FLOOR 13</h1>
      <div class="stats">
        <div class="stat"><span>Fear</span><strong id="fearValue">0</strong></div>
        <div class="meter"><div id="fearMeter"></div></div>
        <div class="stat"><span>Clues</span><strong id="clueValue">0/3</strong></div>
        <div class="stat"><span>Floor 13</span><strong id="lockStatus">LOCKED</strong></div>
      </div>
    </header>

    <main>
      <section id="hubScreen" class="screen">
        <p class="subtitle">Memory Rehabilitation Facility // Elevator Control</p>
        <div id="floorGrid" class="floor-grid"></div>
        <div class="hub-actions">
          <button id="leaveBtn" class="btn ghost hidden">Try to Leave</button>
          <button id="resetBtn" class="btn">Reset Run</button>
          <button id="hardResetBtn" class="btn danger">Hard Reset</button>
        </div>
        <div id="log" class="log" aria-live="polite"></div>
      </section>

      <section id="sceneScreen" class="screen hidden">
        <div class="door-wrap" id="doorWrap">
          <div class="door left"></div>
          <div class="door right"></div>
          <div class="scene-core" id="sceneCore">
            <div id="imageFrame" class="image-frame">
              <img id="sceneImage" alt="Floor scene" />
              <div id="imgFallback" class="img-fallback hidden">MISSING IMAGE</div>
            </div>
            <div class="tags" id="ambientTags"></div>
            <div id="narrative" class="narrative"></div>
            <div id="options" class="options"></div>
            <div id="result" class="result"></div>
            <button id="returnBtn" class="btn hidden">Return to Elevator</button>
          </div>
        </div>
      </section>

      <section id="endingScreen" class="screen hidden">
        <h2 id="endingTitle"></h2>
        <p id="endingText"></p>
        <div class="hub-actions">
          <button id="restartLoopBtn" class="btn">Restart Loop</button>
          <button id="go13Btn" class="btn hidden">Go to Floor 13</button>
        </div>
      </section>
    </main>

    <div id="jumpscare" class="jumpscare hidden" role="alert">
      <div id="jumpText" class="jump-text"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
